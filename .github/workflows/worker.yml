# Copia este archivo a .github/workflows/worker.yml en cada repo cliente.
# Solo necesita el secret GHUB_TOKEN (tu GitHub PAT con scope repo+workflow).

name: Trigger Worker Agent

on:
  issues:
    types: [assigned]
  issue_comment:
    types: [created]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.issue.labels.*.name, 'documentation') &&
      !contains(github.event.issue.labels.*.name, 'automated') &&
      (
        github.event_name == 'issues' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.state == 'open' &&
          !contains(github.event.comment.body, '<!-- worker-bot -->') &&
          github.event.issue.pull_request == null
        )
      )
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GHUB_TOKEN }}
          script: |
            const trigger = context.eventName === 'issue_comment' ? 'comment' : 'assigned';
            const issueNumber = context.payload.issue.number;

            await github.rest.repos.createDispatchEvent({
              owner: 'Edriand',
              repo: 'agent-system',
              event_type: 'run-worker',
              client_payload: {
                project_owner: context.repo.owner,
                project_repo: context.repo.repo,
                issue_number: issueNumber,
                project_number: 2,
                trigger: trigger
              }
            })
