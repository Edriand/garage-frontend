# Copia este archivo a .github/workflows/reviewer.yml en cada repo cliente.
# Solo necesita el secret GHUB_TOKEN (tu GitHub PAT con scope repo+workflow).

name: Trigger Reviewer Agent

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GHUB_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'Edriand',
              repo: 'agent-system',
              event_type: 'run-reviewer',
              client_payload: {
                project_owner: context.repo.owner,
                project_repo: context.repo.repo,
                pr_number: context.payload.pull_request.number,
                project_number: 2
              }
            })
